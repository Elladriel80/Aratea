name: contracts-ci

on:
  push:
    branches: [main]
    paths:
      - 'contracts/**'
      - '.github/workflows/contracts-ci.yml'
  pull_request:
    paths:
      - 'contracts/**'
      - '.github/workflows/contracts-ci.yml'

permissions:
  contents: read

defaults:
  run:
    working-directory: contracts

jobs:
  build-and-test:
    name: Build, format-check, test, coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1.8.0
        with:
          version: stable

      - name: Install dependencies (forge install)
        run: |
          forge install --no-git foundry-rs/forge-std@v1.9.4
          forge install --no-git OpenZeppelin/openzeppelin-contracts@v5.1.0

      - name: Format check
        run: forge fmt --check

      - name: Build
        run: forge build --sizes

      - name: Run tests
        run: forge test -vvv

      - name: Coverage report
        run: forge coverage --report summary --report lcov
        continue-on-error: true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-lcov
          path: contracts/lcov.info
          if-no-files-found: ignore

  static-analysis:
    name: Slither static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1.8.0
        with:
          version: stable

      - name: Install dependencies (forge install)
        run: |
          forge install --no-git foundry-rs/forge-std@v1.9.4
          forge install --no-git OpenZeppelin/openzeppelin-contracts@v5.1.0

      - name: Run Slither
        uses: crytic/slither-action@f197989dea5b53e986d0f88c60a034ddd77ec9a8 # v0.4.0
        id: slither
        with:
          target: contracts/
          slither-config: contracts/slither.config.json
          fail-on: medium
          slither-version: 0.10.4

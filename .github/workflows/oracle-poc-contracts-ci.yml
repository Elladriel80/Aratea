name: oracle-poc-contracts-ci

on:
  push:
    branches: [main]
    paths:
      - 'oracle-poc/contracts/**'
      - '.github/workflows/oracle-poc-contracts-ci.yml'
  pull_request:
    paths:
      - 'oracle-poc/contracts/**'
      - '.github/workflows/oracle-poc-contracts-ci.yml'

permissions:
  contents: read

defaults:
  run:
    working-directory: oracle-poc/contracts

jobs:
  build-and-test:
    name: Build, format-check, test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1.8.0
        with:
          version: stable

      - name: Install dependencies (forge install)
        run: |
          forge install --no-git foundry-rs/forge-std@v1.9.4
          forge install --no-git OpenZeppelin/openzeppelin-contracts@v5.1.0

      - name: Format check
        run: forge fmt --check

      - name: Build
        run: forge build --sizes

      - name: Run tests
        run: forge test -vvv

      - name: Coverage report
        run: forge coverage --report summary --report lcov
        continue-on-error: true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: oracle-poc-coverage-lcov
          path: oracle-poc/contracts/lcov.info
          if-no-files-found: ignore

  static-analysis:
    name: Slither static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1.8.0
        with:
          version: stable

      - name: Install dependencies (forge install)
        run: |
          forge install --no-git foundry-rs/forge-std@v1.9.4
          forge install --no-git OpenZeppelin/openzeppelin-contracts@v5.1.0

      - name: Run Slither
        uses: crytic/slither-action@f197989dea5b53e986d0f88c60a034ddd77ec9a8 # v0.4.0
        id: slither
        with:
          target: oracle-poc/contracts/
          slither-config: oracle-poc/contracts/slither.config.json
          fail-on: medium
          slither-version: 0.10.4

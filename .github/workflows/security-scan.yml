name: Security Scan

# Scans the repository for accidentally committed secrets on every push and
# pull request. Runs gitleaks in two modes:
#   1. `detect` — scans the full git history (catches secrets that slipped in
#      and were later "deleted" but remain in commits).
#   2. `detect --no-git` — scans the working tree as checked out by the runner
#      (catches secrets present in files regardless of git state; e.g. files
#      generated by a build step that would never reach git history).
#
# Exit code 1 when any secret is found → the job fails, blocking the merge.
# `--redact` prevents the secret value from appearing in CI logs.
#
# Supply-chain: the gitleaks binary is downloaded directly from GitHub Releases
# with a SHA-256 checksum verification step — no third-party GitHub Action is
# used, keeping the supply-chain surface minimal and consistent with the rest
# of this repo (all actions are SHA-pinned).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          ARCHIVE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSLO "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${ARCHIVE}"
          curl -sSLO "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/checksums.txt"
          sha256sum --ignore-missing --check checksums.txt
          tar -xzf "${ARCHIVE}" gitleaks
          chmod +x gitleaks
          ./gitleaks version

      - name: Scan git history for secrets
        run: ./gitleaks detect --source . --redact --exit-code 1

      - name: Scan working tree for secrets (no-git)
        run: ./gitleaks detect --no-git --source . --redact --exit-code 1
